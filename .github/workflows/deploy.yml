name: Game Deployment Engine Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Import Code Files
      uses: actions/checkout@v4

    - name: Initialize Java 17 Runtime Environment
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run CI Automated Code Quality Gates (Unit Tests)
      run: mvn clean test

    - name: Authenticate Container Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Compile and Push Production Game Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/programming-game:latest
